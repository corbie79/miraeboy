upstream primary {
    server miraeboy-primary:9300;
}

upstream all_nodes {
    server miraeboy-primary:9300  weight=1;
    server miraeboy-replica:9300  weight=1;
}

server {
    listen 9300;

    # 클라이언트 업로드 크기 제한 (패키지 크기에 맞게 조정)
    client_max_body_size 2g;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 10s;
    proxy_read_timeout    300s;
    proxy_send_timeout    300s;

    # ── 쓰기 요청 → Primary만 ─────────────────────────────────────────────────
    # Conan 패키지 업로드 (PUT)
    location ~ ^/api/conan/[^/]+/v2/conans/ {
        limit_except GET HEAD OPTIONS {
            proxy_pass http://primary;
        }
        proxy_pass http://all_nodes;
    }

    # 리포지토리 / 멤버 관리 API (쓰기는 Primary만)
    location /api/repos {
        limit_except GET HEAD OPTIONS {
            proxy_pass http://primary;
        }
        proxy_pass http://all_nodes;
    }

    # 로그인은 Primary만 (JWT 발급)
    location /api/auth/ {
        proxy_pass http://primary;
    }

    # ── 나머지 (읽기) → 모든 노드 ────────────────────────────────────────────
    location / {
        proxy_pass http://all_nodes;
    }
}
