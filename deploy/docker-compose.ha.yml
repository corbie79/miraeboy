# Active-Passive HA 구성 (S3 백엔드 = MinIO)
# 사용법: docker compose -f docker-compose.ha.yml up -d
#
# 빌드 시 S3 태그 필요:
#   docker compose -f docker-compose.ha.yml build --build-arg BUILD_TAGS=s3

services:

  # ── MinIO (S3 호환 오브젝트 스토리지) ──────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: miraeboy-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO 콘솔 UI
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO 버킷 초기화 ──────────────────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY:-minioadmin} ${MINIO_SECRET_KEY:-minioadmin};
        mc mb --ignore-existing local/miraeboy;
        echo 'MinIO bucket ready.';
      "

  # ── Primary 노드 (읽기 + 쓰기) ────────────────────────────────────────────────
  miraeboy-primary:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        BUILD_TAGS: s3
    container_name: miraeboy-primary
    restart: unless-stopped
    depends_on:
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./config/config.primary.yaml:/etc/miraeboy/config.yaml:ro
    environment:
      - TZ=Asia/Seoul
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9300/ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Replica 노드 (읽기 전용) ───────────────────────────────────────────────────
  miraeboy-replica:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        BUILD_TAGS: s3
    container_name: miraeboy-replica
    restart: unless-stopped
    depends_on:
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./config/config.replica.yaml:/etc/miraeboy/config.yaml:ro
    environment:
      - TZ=Asia/Seoul
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9300/ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── nginx 로드밸런서 ───────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: miraeboy-lb
    restart: unless-stopped
    depends_on:
      - miraeboy-primary
      - miraeboy-replica
    ports:
      - "9300:9300"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9300/ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  minio-data:
