server:
  address: ":9300"
  storage_path: "./data"

auth:
  jwt_secret: "change-me-in-production"
  users:
    - username: "admin"
      password: "admin123"
      admin: true           # 모든 그룹에 자동 owner 권한

    - username: "dev1"
      password: "dev123"
      admin: false

    - username: "ci"
      password: "ci123"
      admin: false

# 서버 시작 시 존재하지 않을 경우에만 생성되는 초기 그룹 정의
groups:
  - name: "conan-local"
    description: "개발용 로컬 패키지"
    owner: "dev1"
    conan_user: "corp"       # 이 그룹에 업로드 시 @user 는 반드시 "corp"
    conan_channel: "dev"     # 이 그룹에 업로드 시 channel은 반드시 "dev"
    anonymous_access: "none"
    members:
      - username: "dev1"
        permission: "owner"
      - username: "ci"
        permission: "write"

  - name: "conan-stable"
    description: "안정 릴리즈"
    owner: "admin"
    conan_user: ""           # 제한 없음
    conan_channel: "stable"
    anonymous_access: "read"
    members: []
