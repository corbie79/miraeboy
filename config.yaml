server:
  address: ":9300"
  storage_path: "./data"   # 로컬 파일시스템 경로 (S3 사용 시 무시됨)
  node_role: "primary"     # "primary" (기본값) 또는 "replica" (읽기 전용)
  artifactory_compat: false  # true 시 /artifactory/api/conan/... URL도 동작 (JFrog 마이그레이션용)

  # S3 호환 스토리지 (MinIO, AWS S3, NCP Object Storage 등)
  # endpoint를 비워두면 로컬 파일시스템 backend를 사용합니다.
  # s3:
  #   endpoint: "minio.example.com:9000"
  #   bucket: "miraeboy"
  #   access_key_id: "minio-access-key"
  #   secret_access_key: "minio-secret-key"
  #   use_ssl: false
  #   region: ""             # AWS S3는 "ap-northeast-2" 등 지정

# 빌드 시스템 — miraeboy-agent 연동
# agent_key를 설정하면 활성화됩니다.
# build:
#   agent_key: "change-me-agent-key"   # miraeboy-agent 인증 키
#   artifacts_dir: "./artifacts"       # 빌드 결과물 저장 경로

auth:
  jwt_secret: "change-me-in-production"

  # OIDC SSO 설정 (Keycloak, Azure AD 등)
  # issuer를 비워두면 비활성화 — 로컬 users: 로그인은 항상 사용 가능
  # oidc:
  #   issuer: "https://keycloak.example.com/realms/company"
  #   client_id: "miraeboy"
  #   client_secret: "your-client-secret"
  #   redirect_url: "http://miraeboy.example.com/api/auth/oidc/callback"
  #
  #   # 그룹 클레임 이름 (Keycloak 기본값: "groups", Azure AD: "groups")
  #   groups_claim: "groups"
  #
  #   # 이 그룹에 속하면 전체 admin 권한
  #   admin_groups: ["miraeboy-admin"]
  #
  #   # OIDC 그룹 → 리포지토리 권한 매핑
  #   group_mappings:
  #     - group: "devteam"
  #       repository: "extralib"
  #       permission: "write"
  #     - group: "readonly-all"
  #       repository: "*"          # 모든 리포지토리에 read
  #       permission: "read"
  #     - group: "ci-team"
  #       repository: "extralib"
  #       permission: "write"

  users:
    - username: "admin"
      password: "admin123"
      admin: true           # 모든 리포지토리에 자동 owner 권한

    - username: "dev1"
      password: "dev123"
      admin: false

    - username: "ci"
      password: "ci123"
      admin: false

# 서버 시작 시 존재하지 않을 경우에만 생성되는 초기 리포지토리 정의
repositories:
  - name: "extralib"
    description: "사내 외부 라이브러리"
    owner: "dev1"
    allowed_namespaces: ["sc"]             # @sc 만 허용 (비어있으면 제한 없음)
    allowed_channels: ["dev", "release"]   # dev, release 만 허용 (비어있으면 제한 없음)
    anonymous_access: "none"
    members:
      - username: "dev1"
        permission: "owner"
      - username: "ci"
        permission: "write"

  - name: "thirdparty"
    description: "서드파티 읽기 전용 미러"
    owner: "admin"
    allowed_namespaces: []   # 제한 없음
    allowed_channels: []     # 제한 없음
    anonymous_access: "read"
    members: []
