server:
  address: ":9300"
  storage_path: "./data"

auth:
  jwt_secret: "change-me-in-production"
  users:
    - username: "admin"
      password: "admin123"
      admin: true           # 모든 리포지토리에 자동 owner 권한

    - username: "dev1"
      password: "dev123"
      admin: false

    - username: "ci"
      password: "ci123"
      admin: false

# 서버 시작 시 존재하지 않을 경우에만 생성되는 초기 리포지토리 정의
repositories:
  - name: "extralib"
    description: "사내 외부 라이브러리"
    owner: "dev1"
    allowed_namespaces: ["sc"]             # @sc 만 허용 (비어있으면 제한 없음)
    allowed_channels: ["dev", "release"]   # dev, release 만 허용 (비어있으면 제한 없음)
    anonymous_access: "none"
    members:
      - username: "dev1"
        permission: "owner"
      - username: "ci"
        permission: "write"

  - name: "thirdparty"
    description: "서드파티 읽기 전용 미러"
    owner: "admin"
    allowed_namespaces: []   # 제한 없음
    allowed_channels: []     # 제한 없음
    anonymous_access: "read"
    members: []
