server:
  address: ":9300"
  storage_path: "./data"   # 로컬 파일시스템 경로 (S3 사용 시 무시됨)
  node_role: "primary"     # "primary" (기본값) 또는 "replica" (읽기 전용)

  # S3 호환 스토리지 (MinIO, AWS S3, NCP Object Storage 등)
  # endpoint를 비워두면 로컬 파일시스템 backend를 사용합니다.
  # s3:
  #   endpoint: "minio.example.com:9000"
  #   bucket: "miraeboy"
  #   access_key_id: "minio-access-key"
  #   secret_access_key: "minio-secret-key"
  #   use_ssl: false
  #   region: ""             # AWS S3는 "ap-northeast-2" 등 지정

auth:
  jwt_secret: "change-me-in-production"
  users:
    - username: "admin"
      password: "admin123"
      admin: true           # 모든 리포지토리에 자동 owner 권한

    - username: "dev1"
      password: "dev123"
      admin: false

    - username: "ci"
      password: "ci123"
      admin: false

# 서버 시작 시 존재하지 않을 경우에만 생성되는 초기 리포지토리 정의
repositories:
  - name: "extralib"
    description: "사내 외부 라이브러리"
    owner: "dev1"
    allowed_namespaces: ["sc"]             # @sc 만 허용 (비어있으면 제한 없음)
    allowed_channels: ["dev", "release"]   # dev, release 만 허용 (비어있으면 제한 없음)
    anonymous_access: "none"
    members:
      - username: "dev1"
        permission: "owner"
      - username: "ci"
        permission: "write"

  - name: "thirdparty"
    description: "서드파티 읽기 전용 미러"
    owner: "admin"
    allowed_namespaces: []   # 제한 없음
    allowed_channels: []     # 제한 없음
    anonymous_access: "read"
    members: []
